<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Student Management System
  </title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Custom CSS -->
  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

<div class="d-flex">

  <!-- Sidebar -->
  <div class="sidebar bg-dark text-white p-3">

    <h3 class="mb-4">
      SMS
    </h3>
    <li class="nav-item mt-4">

  <button
    class="btn btn-danger w-100"
    onclick="logout()"
  >
    Logout
  </button>

</li>

    <ul class="nav flex-column">

      <li class="nav-item mb-2">
        <a
          class="nav-link text-white"
          href="#"
        >
          Dashboard
        </a>
      </li>

      <li class="nav-item mb-2">
        <a
          class="nav-link text-white"
          href="#"
        >
          學生管理
        </a>
      </li>

    </ul>

  </div>


  <!-- Main Content -->
  <div class="main-content p-4">

    <h1 class="mb-4">
      Student Management System
    </h1>


    <!-- Dashboard Cards -->
    <div class="row mb-4">

      <!-- Total Students -->
      <div class="col-md-4">

        <div class="card shadow">

          <div class="card-body">

            <h5>
              學生總數
            </h5>

            <h2 id="totalStudents">
              0
            </h2>

          </div>

        </div>

      </div>


      <!-- Male Students -->
      <div class="col-md-4">

        <div class="card shadow">

          <div class="card-body">

            <h5>
              男性學生
            </h5>

            <h2 id="maleStudents">
              0
            </h2>

          </div>

        </div>

      </div>


      <!-- Female Students -->
      <div class="col-md-4">

        <div class="card shadow">

          <div class="card-body">

            <h5>
              女性學生
            </h5>

            <h2 id="femaleStudents">
              0
            </h2>

          </div>

        </div>

      </div>

    </div>


    
     <!-- Charts -->
<div class="row mb-4">

  <!-- Gender Chart -->
  <div class="col-md-6">

    <div class="card shadow">

      <div class="card-body">

        <h5 class="mb-3">
          男女比例分析
        </h5>

        <canvas id="genderChart"></canvas>

      </div>

    </div>

  </div>


  <!-- Department Chart -->
  <div class="col-md-6">

    <div class="card shadow">

      <div class="card-body">

        <h5 class="mb-3">
          科系統計分析
        </h5>

        <canvas id="departmentChart"></canvas>

      </div>

    </div>

  </div>

</div>
   <!-- Top Bar -->
<div class="d-flex justify-content-between align-items-center mb-3">

  <h2>
    學生列表
  </h2>


  <!-- Search -->
  <div>

    <input
      type="text"
      id="searchInput"
      class="form-control"
      placeholder="搜尋學生..."
      onkeyup="searchStudents()"
    >

  </div>


  <!-- Buttons -->
  <div class="d-flex gap-2">

    <!-- Dark Mode -->
  <button
    class="btn btn-dark"
    onclick="toggleDarkMode()"
  >
    Dark Mode
  </button>

    <!-- Export Excel -->
    <button
      class="btn btn-success"
      onclick="exportExcel()"
    >
      匯出 Excel
    </button>

    </button>


  <!-- Export PDF -->
  <button
    class="btn btn-danger"
    onclick="exportPDF()"
  >
    匯出 PDF
  </button>



    <!-- Add Student -->
    <button
      class="btn btn-primary"
      data-bs-toggle="modal"
      data-bs-target="#addStudentModal"
    >
      新增學生
    </button>

  </div>

</div>


    <!-- Student Table -->
    <table class="table table-bordered table-hover shadow">

      <thead class="table-dark">

        <tr>

          <th>ID</th>
          <th>學號</th>
          <th>姓名</th>
          <th>性別</th>
          <th>Email</th>
          <th>電話</th>
          <th>科系</th>
          <th>操作</th>

        </tr>

      </thead>

      <tbody id="studentTableBody">

      </tbody>

    </table>
    <!-- Pagination -->
<nav class="mt-4">

  <ul
    class="pagination justify-content-center"
    id="pagination"
  >

  </ul>

</nav>

  </div>

</div>


<!-- Add Student Modal -->
<div
  class="modal fade"
  id="addStudentModal"
  tabindex="-1"
>

  <div class="modal-dialog">

    <div class="modal-content">

      <div class="modal-header">

        <h5 class="modal-title">
          新增學生
        </h5>

        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
        ></button>

      </div>


      <div class="modal-body">

        <form id="studentForm">

          <div class="mb-3">

            <label class="form-label">
              學號
            </label>

            <input
              type="text"
              class="form-control"
              id="student_id"
              required
            >

          </div>


          <div class="mb-3">

            <label class="form-label">
              姓名
            </label>

            <input
              type="text"
              class="form-control"
              id="name"
              required
            >

          </div>


          <div class="mb-3">

            <label class="form-label">
              性別
            </label>

            <select
              class="form-select"
              id="gender"
            >
              <option>男</option>
              <option>女</option>
            </select>

          </div>


          <div class="mb-3">

            <label class="form-label">
              Email
            </label>

            <input
              type="email"
              class="form-control"
              id="email"
            >

          </div>


          <div class="mb-3">

            <label class="form-label">
              電話
            </label>

            <input
              type="text"
              class="form-control"
              id="phone"
            >

          </div>


          <div class="mb-3">

            <label class="form-label">
              科系
            </label>

            <input
              type="text"
              class="form-control"
              id="department"
            >

          </div>

        </form>

      </div>


      <div class="modal-footer">

        <button
          type="button"
          class="btn btn-secondary"
          data-bs-dismiss="modal"
        >
          關閉
        </button>


        <button
          type="button"
          class="btn btn-primary"
          onclick="addStudent()"
        >
          新增
        </button>

      </div>

    </div>

  </div>

</div>

<!-- Toast Container -->
<div
  class="toast-container position-fixed top-0 end-0 p-3"
>

  <div
    id="liveToast"
    class="toast align-items-center text-bg-success border-0"
    role="alert"
  >

    <div class="d-flex">

      <div
        class="toast-body"
        id="toastMessage"
      >
        Success
      </div>

      <button
        type="button"
        class="btn-close btn-close-white me-2 m-auto"
        data-bs-dismiss="toast"
      ></button>

    </div>

  </div>

</div>


<!-- Bootstrap JS -->
<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- XLSX -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- AutoTable -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<!-- Custom JS -->
<script src="app.js"></script>

</body>

</html>
