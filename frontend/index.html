<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    學生管理系統
  </title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Custom CSS -->
  <link
    rel="stylesheet"
    href="style.css"
  >

</head>


<body>

  <div class="d-flex">

   
    <!-- 側面控制系統 --> 
    <div
      class="bg-dark text-white p-3"
      style="
        width: 250px;
        min-height: 100vh;
      "
    >

      <h3 class="mb-4">
        學生系統
      </h3>

      <ul class="nav flex-column gap-2">

        <!-- 登出 -->
        <li>

          <button
            class="btn btn-danger w-100"
            onclick="logout()"
          >
            登出
          </button>

        </li>


        <!-- Dashboard -->
        <li>

          <button
            class="btn btn-outline-light w-100 text-start"
            onclick="showSection('dashboardSection')"
          >
            管理板
          </button>

        </li>


        <!-- Student -->
        <li>

          <button
            class="btn btn-outline-light w-100 text-start"
            onclick="showSection('studentSection')"
          >
            學生管理
          </button>

        </li>

        <!-- Teacher -->
        <li>
          <button
            class="btn btn-outline-light w-100 text-start"
            onclick="showSection('teacherSection')"
          >
            教師管理
          </button>
        </li>

        <!-- Course -->
        <li>
  <button
    class="btn btn-outline-light w-100 text-start"
    onclick="showSection('courseSection')"
  >
    課程管理
  </button>
        </li>

        <!-- Enrollment -->
        <li>
  <button
    class="btn btn-outline-light w-100 text-start"
    onclick="showSection('enrollmentSection')"
  >
    選課管理
  </button>
        </li>

      </ul>

    </div>


    <!-- Main Content -->
    <div class="main-content p-4 flex-grow-1">


      <!-- 數據統計 -->
      <div
        id="dashboardSection"
        class="content-section"
      >

        <h1 class="mb-4">
          數據統計
        </h1>

        <!-- 男女比例 -->
        <div class="row mb-4">

          <!-- Total -->
          <div class="col-md-4">

            <div class="card shadow">

              <div class="card-body">

                <h5>學生總數</h5>

                <h2 id="totalStudents">
                  0
                </h2>

              </div>

            </div>

          </div>


          <!-- Male -->
          <div class="col-md-4">

            <div class="card shadow">

              <div class="card-body">

                <h5>男性學生</h5>

                <h2 id="maleStudents">
                  0
                </h2>

              </div>

            </div>

          </div>


          <!-- Female -->
          <div class="col-md-4">

            <div class="card shadow">

              <div class="card-body">

                <h5>女性學生</h5>

                <h2 id="femaleStudents">
                  0
                </h2>

              </div>

            </div>

          </div>

        </div>


        <!-- 科系分析 -->
        <div class="row mb-4">

          <!-- Gender Chart -->
          <div class="col-md-6">

            <div class="card shadow">

              <div class="card-body">

                <h5 class="mb-3">
                  男女比例分析
                </h5>

                <canvas id="genderChart"></canvas>

              </div>

            </div>

          </div>

          <!-- Department Chart -->
          <div class="col-md-6">

            <div class="card shadow">

              <div class="card-body">

                <h5 class="mb-3">
                  科系統計分析
                </h5>

                <canvas id="departmentChart"></canvas>

              </div>

            </div>

          </div>
          <!-- Teacher Count -->
        <div class="col-md-4 mt-3">
  <div class="card shadow">
    <div class="card-body">
      <h5>教師總數</h5>
      <h2 id="totalTeachers">0</h2>
    </div>
  </div>
        </div>

        <!-- Course Count -->
        <div class="col-md-4 mt-3">
  <div class="card shadow">
    <div class="card-body">
      <h5>課程總數</h5>
      <h2 id="totalCourses">0</h2>
    </div>
  </div>
        </div>

        </div>

        

      </div>

    <!-- 學生管理 -->     
      <div id="studentSection"class="content-section">
        <h1 class="mb-4">
          學生管理
        </h1>


        <!-- Top Bar -->
        <div
          class="
            d-flex
            justify-content-between
            align-items-center
            mb-4
            flex-wrap
            gap-3
          "
        >
           

          <!-- Search -->
          <input
            type="text"
            id="searchInput"
            class="form-control"
            placeholder="搜尋學生..."
            onkeyup="searchStudents()"
            style="width: 220px;"
          >
          


          <div class="d-flex gap-2 flex-wrap">

            <!-- Dark Mode -->
            <button
              class="btn btn-dark"
              onclick="toggleDarkMode()"
            >
              🌙
            </button>

            <!-- Export Excel -->
            <button
              class="btn btn-success"
              onclick="exportExcel()"
            >
              匯出 Excel
            </button>

            <!-- Export PDF -->
            <button
              class="btn btn-danger"
              onclick="exportPDF()"
            >
              匯出 PDF
            </button>

            <!-- Add Student -->
            <button
              class="btn btn-primary"
              data-bs-toggle="modal"
              data-bs-target="#addStudentModal"
            >
              + 新增學生
            </button>

          </div>

        </div>


        <!-- Student Table -->
        <table class="table table-bordered table-hover shadow">

          <thead class="table-dark">

            <tr>

              <th>學號</th>
              <th>姓名</th>
              <th>性別</th>
              <th>Email</th>
              <th>電話</th>
              <th>科系</th>
              <th>操作</th>

              

            </tr>

          </thead>

          <tbody id="studentTableBody">


          </tbody>

        </table>


        <!-- Pagination -->
        <nav class="mt-4">

          <ul
            class="pagination justify-content-center"
            id="pagination"
          >

          </ul>

        </nav>
        <!-- Add Student Modal -->
        <div
        class="modal fade"
        id="addStudentModal"
        tabindex="-1">

      <div class="modal-dialog">

    <div class="modal-content">

      <div class="modal-header">

        <h5 class="modal-title">
          新增學生
        </h5>

        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
        ></button>

      </div>


      <div class="modal-body">

        <form id="studentForm">

          <div class="mb-3">

            <label class="form-label">
              學號
            </label>

            <input
              type="text"
              class="form-control"
              id="student_id"
              required
            >

          </div>


          <div class="mb-3">

            <label class="form-label">
              姓名
            </label>

            <input
              type="text"
              class="form-control"
              id="name"
              required
            >

          </div>


          <div class="mb-3">

            <label class="form-label">
              性別
            </label>

            <select
              class="form-select"
              id="gender"
            >
              <option>男</option>
              <option>女</option>
            </select>

          </div>


          <div class="mb-3">

            <label class="form-label">
              Email
            </label>

            <input
              type="email"
              class="form-control"
              id="email"
            >

          </div>


          <div class="mb-3">

            <label class="form-label">
              電話
            </label>

            <input
              type="text"
              class="form-control"
              id="phone"
              maxlength="10"
              placeholder="例如 09xxxxxxxx"
            >

          </div>


          <div class="mb-3">

            <label class="form-label">
              科系
            </label>
            <select
            id="department"
            class="form-select"
            required>

            <option value="">
              請選擇科系
            </option>

            <option value="資訊工程系">
              資訊工程系
            </option>

            <option value="電機工程系">
              電機工程系
            </option>

            <option value="企業管理系">
              企業管理系
            </option>

            <option value="財務金融系">
              財務金融系
            </option>

            <option value="機械工程系">
              機械工程系
            </option>

            <option value="應用外語系">
              應用外語系
            </option>

            <option value="資訊管理系">
              資訊管理系
            </option>

            </select>


            

          </div>

        </form>

      </div>


      <div class="modal-footer">

        <button
          type="button"
          class="btn btn-secondary"
          data-bs-dismiss="modal"
        >
          關閉
        </button>


        <button
          type="button"
          class="btn btn-primary"
          onclick="addStudent()"
        >
          新增
        </button>

      </div>

    </div>

      </div>

        </div>

        <!-- Edit Student Modal -->
        <div
  class="modal fade"
  id="editStudentModal"
  tabindex="-1"
>
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">編輯學生</h5>

        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
        ></button>
      </div>

      <div class="modal-body">

        <input type="hidden" id="edit_id">

        <div class="mb-3">
          <label class="form-label">學號</label>
          <input type="text" class="form-control" id="edit_student_id">
        </div>

        <div class="mb-3">
          <label class="form-label">姓名</label>
          <input type="text" class="form-control" id="edit_name">
        </div>

        <div class="mb-3">
          <label class="form-label">性別</label>
          <select class="form-select" id="edit_gender">
            <option value="男">男</option>
            <option value="女">女</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="edit_email">
        </div>

        <div class="mb-3">
          <label class="form-label">電話</label>
          <input type="text" class="form-control" id="edit_phone">
        </div>

        <div class="mb-3">
          <label class="form-label">科系</label>
          <select class="form-select" id="edit_department">
            <option value="資訊工程系">資訊工程系</option>
            <option value="電機工程系">電機工程系</option>
            <option value="企業管理系">企業管理系</option>
            <option value="財務金融系">財務金融系</option>
            <option value="機械工程系">機械工程系</option>
            <option value="應用外語系">應用外語系</option>
            <option value="資訊管理系">資訊管理系</option>
          </select>
        </div>

      </div>

      <div class="modal-footer">
        <button
          type="button"
          class="btn btn-secondary"
          data-bs-dismiss="modal"
        >
          關閉
        </button>

        <button
          type="button"
          class="btn btn-primary"
          onclick="updateStudent()"
        >
          儲存修改
        </button>
      </div>

    </div>
  </div>
        </div>
      </div>

      <!-- 教師管理 -->
      <div id="teacherSection" class="content-section">

      <h1 class="mb-4">教師管理</h1>

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">

    <input
      type="text"
      id="teacherSearchInput"
      class="form-control"
      placeholder="搜尋教師..."
      onkeyup="searchTeachers()"
      style="width: 220px;"
    >

   <button
      class="btn btn-primary"
      data-bs-toggle="modal"
      data-bs-target="#addTeacherModal"
    >
      + 新增教師
    </button>

    </div>

  <table class="table table-bordered table-hover shadow">
    <thead class="table-dark">
      <tr>
        <th>教師編號</th>
        <th>姓名</th>
        <th>性別</th>
        <th>Email</th>
        <th>電話</th>
        <th>科系</th>
        <th>職稱</th>
        <th>操作</th>
      </tr>
    </thead>

    <tbody id="teacherTableBody"></tbody>
    </table>
    <!-- Add Teacher Modal -->
<div
  class="modal fade"
  id="addTeacherModal"
  tabindex="-1"
>
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">新增教師</h5>

        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
        ></button>
      </div>

      <div class="modal-body">

        <input
          type="text"
          class="form-control mb-2"
          id="teacher_id"
          placeholder="教師編號"
        >

        <input
          type="text"
          class="form-control mb-2"
          id="teacher_name"
          placeholder="教師姓名"
        >

        <select
          class="form-select mb-2"
          id="teacher_gender"
        >
          <option value="男">男</option>
          <option value="女">女</option>
        </select>

        <input
          type="email"
          class="form-control mb-2"
          id="teacher_email"
          placeholder="Email"
        >

        <input
          type="text"
          class="form-control mb-2"
          id="teacher_phone"
          maxlength="10"
          placeholder="例如 09xxxxxxxx"
        >

        <select
          class="form-select mb-2"
          id="teacher_department"
        >
          <option value="資訊工程系">資訊工程系</option>
          <option value="電機工程系">電機工程系</option>
          <option value="企業管理系">企業管理系</option>
          <option value="財務金融系">財務金融系</option>
          <option value="資訊管理系">資訊管理系</option>
          <option value="應用外語系">應用外語系</option>
        </select>

        <select
          class="form-select"
          id="teacher_title"
        >
          <option value="教授">教授</option>
          <option value="副教授">副教授</option>
          <option value="助理教授">助理教授</option>
          <option value="講師">講師</option>
        </select>

      </div>

      <div class="modal-footer">

        <button
          class="btn btn-secondary"
          data-bs-dismiss="modal"
        >
          關閉
        </button>

        <button
          class="btn btn-primary"
          onclick="addTeacher()"
        >
          新增
        </button>

      </div>

    </div>
  </div>
</div>

      </div>

      <!-- 課程管理 -->
      <div id="courseSection" class="content-section">

  <h1 class="mb-4">課程管理</h1>

  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">

    <input
      type="text"
      id="courseSearchInput"
      class="form-control"
      placeholder="搜尋課程..."
      onkeyup="searchCourses()"
      style="width: 220px;"
    >

    <button
      class="btn btn-primary"
      data-bs-toggle="modal"
      data-bs-target="#addCourseModal"
    >
      + 新增課程
    </button>

  </div>

  <table class="table table-bordered table-hover shadow">
    <thead class="table-dark">
      <tr>
        <th>課程代碼</th>
        <th>課程名稱</th>
        <th>教師編號</th>
        <th>授課教師</th>
        <th>學分</th>
        <th>教室</th>
        <th>操作</th>
      </tr>
    </thead>

    <tbody id="courseTableBody"></tbody>
  </table>

  <!-- Add Course Modal -->
<div
  class="modal fade"
  id="addCourseModal"
  tabindex="-1"
>
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">新增課程</h5>

        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
        ></button>
      </div>

      <div class="modal-body">

        <input
          type="text"
          class="form-control mb-2"
          id="course_id"
          placeholder="課程代碼，例如 C001"
        >

        <input
          type="text"
          class="form-control mb-2"
          id="course_name"
          placeholder="課程名稱"
        >

        <input
          type="text"
          class="form-control mb-2"
          id="course_teacher_id"
          placeholder="教師編號，例如 T001"
        >

        <input
          type="number"
          class="form-control mb-2"
          id="course_credits"
          placeholder="學分，例如 3"
          min="1"
          max="6"
        >

        <input
          type="text"
          class="form-control mb-2"
          id="course_classroom"
          placeholder="教室，例如 A101"
        >

      </div>

      <div class="modal-footer">

        <button
          class="btn btn-secondary"
          data-bs-dismiss="modal"
        >
          關閉
        </button>

        <button
          class="btn btn-primary"
          onclick="addCourse()"
        >
          新增
        </button>

      </div>

    </div>
  </div>
</div>

<!-- Edit Course Modal -->
<div
  class="modal fade"
  id="editCourseModal"
  tabindex="-1"
>
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">編輯課程</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
        ></button>
      </div>

      <div class="modal-body">

        <input type="hidden" id="edit_course_db_id">

        <input
          type="text"
          class="form-control mb-2"
          id="edit_course_id"
          placeholder="課程代碼，例如 C001"
        >

        <input
          type="text"
          class="form-control mb-2"
          id="edit_course_name"
          placeholder="課程名稱"
        >

        <input
          type="text"
          class="form-control mb-2"
          id="edit_course_teacher_id"
          placeholder="教師編號，例如 T001"
        >

        <input
          type="number"
          class="form-control mb-2"
          id="edit_course_credits"
          min="1"
          max="6"
          placeholder="學分"
        >

        <input
          type="text"
          class="form-control mb-2"
          id="edit_course_classroom"
          placeholder="教室"
        >

      </div>

      <div class="modal-footer">
        <button
          class="btn btn-secondary"
          data-bs-dismiss="modal"
        >
          關閉
        </button>

        <button
          class="btn btn-primary"
          onclick="updateCourse()"
        >
          儲存修改
        </button>
      </div>

    </div>
  </div>
</div>

      </div>

      <!-- 選課管理 -->
      <div id="enrollmentSection" class="content-section">

  <h1 class="mb-4">選課管理</h1>

  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">

    <input
      type="text"
      id="enrollmentSearchInput"
      class="form-control"
      placeholder="搜尋學生 / 課程..."
      onkeyup="searchEnrollments()"
      style="width: 260px;"
    >

    <button
      class="btn btn-primary"
      data-bs-toggle="modal"
      data-bs-target="#addEnrollmentModal"
    >
      + 新增選課
    </button>

  </div>

  <table class="table table-bordered table-hover shadow">
    <thead class="table-dark">
      <tr>
        <th>學號</th>
        <th>學生姓名</th>
        <th>課程代碼</th>
        <th>課程名稱</th>
        <th>操作</th>
      </tr>
    </thead>

    <tbody id="enrollmentTableBody"></tbody>
  </table>
  <!-- Add Enrollment Modal -->
<div
  class="modal fade"
  id="addEnrollmentModal"
  tabindex="-1"
>
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">新增選課</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
        ></button>
      </div>

      <div class="modal-body">

        <input
          type="text"
          class="form-control mb-2"
          id="enrollment_student_id"
          placeholder="學號，例如 S001"
        >

        <input
          type="text"
          class="form-control mb-2"
          id="enrollment_course_id"
          placeholder="課程代碼，例如 C001"
        >

      </div>

      <div class="modal-footer">
        <button
          class="btn btn-secondary"
          data-bs-dismiss="modal"
        >
          關閉
        </button>

        <button
          class="btn btn-primary"
          onclick="addEnrollment()"
        >
          新增
        </button>
      </div>

    </div>
  </div>
</div>

      </div>

    </div>

  </div>




<!-- Toast Container -->
<div
  class="toast-container position-fixed top-0 end-0 p-3"
>

  <div
    id="liveToast"
    class="toast align-items-center border-0"
    role="alert"
  >

    <div class="d-flex">

      <div
        class="toast-body"
        id="toastMessage"
      >
        Success
      </div>

      <button
        type="button"
        class="btn-close btn-close-white me-2 m-auto"
        data-bs-dismiss="toast"
      ></button>

    </div>

  </div>

</div>


<!-- Bootstrap JS -->
<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- XLSX -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- AutoTable -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<!-- Chinese label -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- Custom JS -->
<script src="app.js"></script>
</body>

</html>
